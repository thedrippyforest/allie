<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>啾寶的角落英語探險</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel (為了讓瀏覽器能直接解析 JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* 隱藏滾動條的工具類 */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    /* 3D 翻轉卡片效果 */
    .perspective-1000 {
      perspective: 1000px;
    }
    body {
      touch-action: pan-y; /* 改善平板繪圖時的觸控體驗 */
    }
  </style>
</head>
<body class="bg-stone-50 text-gray-700 font-sans">
  
  <div id="root"></div>

  <!-- Lucide Icons Icon 組件模擬 (因為在 CDN 環境下無法直接使用 import) -->
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // --- 圖示組件模擬 ---
    // 由於我們是在純 HTML 中使用 React，無法直接 import lucide-react，
    // 因此這裡建立簡單的 SVG 模擬圖示，或直接使用內建 emoji 來取代部分圖示。
    const Star = ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>;
    const Check = ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;
    const Volume2 = ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>;
    const ImageIcon = ({ className }) => <span className={className} style={{display:'inline-block'}}>🎴</span>;
    const Search = ({ className }) => <span className={className} style={{display:'inline-block'}}>🔍</span>;
    const BookOpen = ({ className }) => <span className={className} style={{display:'inline-block'}}>📖</span>;
    const Car = ({ className }) => <span className={className} style={{display:'inline-block'}}>🚗</span>;
    const RefreshCcw = ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"></polyline><polyline points="23 20 23 14 17 14"></polyline><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path></svg>;
    const Edit2 = ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>;
    const Award = ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>;


    // --- 語音功能 (TTS) ---
    const playAudio = (text, rate = 0.4) => {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'en-US';
        msg.rate = rate;
        window.speechSynthesis.speak(msg);
      }
    };

    // --- 資料庫 (整合 Chapter 3 ~ Chapter 6) ---
    const courseData = [
      {
        id: 0,
        title: 'L3 Wild Animals 野生動物',
        themeColor: 'bg-green-100',
        btnColor: 'bg-green-500',
        words: [
          { en: 'giraffe', zh: '長頸鹿', icon: '🦒' },
          { en: 'elephant', zh: '大象', icon: '🐘' },
          { en: 'crocodile', zh: '鱷魚', icon: '🐊' },
          { en: 'monkey', zh: '猴子', icon: '🐒' },
          { en: 'tiger', zh: '老虎', icon: '🐅' }
        ],
        riddle: { q: "I am very tall. I eat green leaves. What am I?", options: ['elephant', 'giraffe', 'lion'], a: 'giraffe' },
        sentence: "What are these? They're monkeys!",
        drawPrompt: "畫一隻你最喜歡的野生動物 (Draw your favorite animal!)",
        mission: "今天去動物園，找找看 giraffe 和 elephant 在哪裡吧！",
        reward: {
          name: "角落叢林探險隊",
          desc: "長頸鹿和大象躲在角落吃著綠葉，一起喝著下午茶！",
          emoji: "🦒🍵🐘",
          color: "bg-emerald-100 border-emerald-300 text-emerald-800"
        }
      },
      {
        id: 1,
        title: 'L4 My House 我的家',
        themeColor: 'bg-orange-100',
        btnColor: 'bg-orange-500',
        words: [
          { en: 'bedroom', zh: '臥室', icon: '🛏️' },
          { en: 'bathroom', zh: '浴室', icon: '🛁' },
          { en: 'kitchen', zh: '廚房', icon: '🍳' },
          { en: 'living room', zh: '客廳', icon: '🛋️' },
          { en: 'yard', zh: '院子', icon: '🌳' }
        ],
        riddle: { q: "I have a bed. You sleep here. Where am I?", options: ['kitchen', 'bathroom', 'bedroom'], a: 'bedroom' },
        sentence: "Where's the cat? It's under the table.",
        drawPrompt: "畫出你夢想中的溫馨小臥室 (Draw your dream bedroom!)",
        mission: "今天去 IKEA，把角落小夥伴藏在樣品屋的 bed 或是 chair 上面玩躲貓貓！",
        reward: {
          name: "溫馨角落小屋",
          desc: "小夥伴們在溫暖的沙發上擠在一起蓋著同一條毯子！",
          emoji: "🛋️🛌🧸",
          color: "bg-amber-100 border-amber-300 text-amber-800"
        }
      },
      {
        id: 2,
        title: 'L5 My Town 我的城鎮',
        themeColor: 'bg-blue-100',
        btnColor: 'bg-blue-500',
        words: [
          { en: 'library', zh: '圖書館', icon: '📚' },
          { en: 'park', zh: '公園', icon: '⛲' },
          { en: 'hospital', zh: '醫院', icon: '🏥' },
          { en: 'cafe', zh: '咖啡廳', icon: '☕' },
          { en: 'zoo', zh: '動物園', icon: '🐘' }
        ],
        riddle: { q: "You can read many books here. Where is it?", options: ['cafe', 'park', 'library'], a: 'library' },
        sentence: "Is there a park? Yes, there is. Go straight!",
        drawPrompt: "畫一張藏寶圖，標出 park 和 cafe 的位置！",
        mission: "今天出門當媽媽的小導航員，找找路上的 cafe 在哪裡？",
        reward: {
          name: "角落小鎮散步",
          desc: "大家戴著帽子排隊在咖啡廳買珍珠奶茶，旁邊還有一座小公園！",
          emoji: "☕🌳🧋",
          color: "bg-sky-100 border-sky-300 text-sky-800"
        }
      },
      {
        id: 3,
        title: 'L6 My Family 家庭與寵物',
        themeColor: 'bg-pink-100',
        btnColor: 'bg-pink-500',
        words: [
          { en: 'mom', zh: '媽媽', icon: '👩' },
          { en: 'dad', zh: '爸爸', icon: '👨' },
          { en: 'sister', zh: '姊妹', icon: '👧' },
          { en: 'brother', zh: '兄弟', icon: '👦' },
          { en: 'dog', zh: '狗', icon: '🐕' }
        ],
        riddle: { q: "I say 'woof woof'. I am a pet. What am I?", options: ['cat', 'bird', 'dog'], a: 'dog' },
        sentence: "I have a sister. I don't have a brother.",
        drawPrompt: "畫出可愛的啾寶、桔寶還有爸爸媽媽！",
        mission: "今天去大草原野餐，找找看別人有沒有帶 dog 或 cat 喔！",
        reward: {
          name: "角落家族大集合",
          desc: "啾寶、桔寶和爸爸媽媽，還有角落小夥伴變成寵物圍繞在身邊！",
          emoji: "👨‍👩‍👧‍👦🐕💖",
          color: "bg-rose-100 border-rose-300 text-rose-800"
        }
      }
    ];

    // ============================================================================
    // 主應用程式 App
    // ============================================================================
    function App() {
      const [currentLessonId, setCurrentLessonId] = useState(0);
      const [activeTask, setActiveTask] = useState(1);
      const [stars, setStars] = useState(0);
      const [completedTasks, setCompletedTasks] = useState(new Set());
      const [showReward, setShowReward] = useState(false);

      const lesson = courseData[currentLessonId];

      const handleComplete = (taskId) => {
        let newCompleted = new Set(completedTasks);
        if (!completedTasks.has(taskId)) {
          setStars(prev => prev + 1);
          newCompleted.add(taskId);
          setCompletedTasks(newCompleted);
        }
        
        if (newCompleted.size === 5) {
          setTimeout(() => setShowReward(true), 800);
        } else if (taskId < 5) {
          setTimeout(() => setActiveTask(taskId + 1), 1000);
        }
      };

      const handleLessonChange = (id) => {
        setCurrentLessonId(id);
        setActiveTask(1);
        setCompletedTasks(new Set());
        setShowReward(false);
      };

      return (
        <div className="min-h-screen bg-stone-50 font-sans text-gray-700 pb-12 flex flex-col items-center">
          <div className="w-full bg-white p-4 shadow-sm flex justify-center sticky top-0 z-20">
            <div className="w-full max-w-3xl flex justify-between items-center">
              <div className="flex items-center space-x-3">
                <div className="w-12 h-12 bg-teal-100 rounded-full flex items-center justify-center text-2xl shadow-sm border border-teal-200">
                  🌱
                </div>
                <div>
                  <h1 className="font-bold text-teal-800 text-xl tracking-wide">啾寶的角落探險</h1>
                  <p className="text-sm text-teal-600">集中闖關挑戰 ‧ 平板升級版</p>
                </div>
              </div>
              <div className="flex items-center bg-yellow-100 px-4 py-2 rounded-full shadow-sm border border-yellow-200">
                <Star className="w-6 h-6 text-yellow-500 fill-current mr-2" />
                <span className="font-bold text-yellow-700 text-lg">{stars} 顆星星</span>
              </div>
            </div>
          </div>

          <div className="w-full max-w-3xl p-4 md:p-6 mt-2">
            <div className="flex overflow-x-auto space-x-3 md:space-x-4 pb-4 mb-4 hide-scrollbar">
              {courseData.map((data) => (
                <button
                  key={data.id}
                  onClick={() => handleLessonChange(data.id)}
                  className={`flex-shrink-0 px-5 py-3 rounded-2xl transition-all font-bold border-2 text-sm md:text-base whitespace-nowrap
                    ${currentLessonId === data.id ? 'bg-white border-teal-400 shadow-md transform scale-105 text-teal-700' : 'bg-gray-100 border-transparent text-gray-500 hover:bg-gray-200'}`}
                >
                  {data.title}
                </button>
              ))}
            </div>

            <div className="bg-white rounded-3xl p-5 md:p-6 shadow-sm border border-gray-100 mb-6">
              <h2 className="text-xl font-bold mb-4 text-gray-700 flex items-center">
                今日特訓任務板
              </h2>
              <div className="grid grid-cols-5 gap-3 md:gap-4">
                {[
                  { id: 1, icon: '🎴', label: '魔法字卡' },
                  { id: 2, icon: '🎧', label: '聽音大考驗' },
                  { id: 3, icon: '🕵️', label: '小偵探猜謎' },
                  { id: 4, icon: '🗣️', label: '大聲說' },
                  { id: 5, icon: '🎨', label: '動手出任務' }
                ].map((task) => (
                  <button
                    key={task.id}
                    onClick={() => setActiveTask(task.id)}
                    className={`flex flex-col items-center justify-center p-3 md:p-4 rounded-2xl transition-all
                      ${activeTask === task.id ? `${lesson.themeColor} shadow-md border-2 border-white transform scale-105` : 'bg-gray-50 hover:bg-gray-100 border-2 border-transparent'}
                      ${completedTasks.has(task.id) && activeTask !== task.id ? 'opacity-60' : ''}
                    `}
                  >
                    <div className="text-3xl md:text-4xl mb-2 relative">
                      {task.icon}
                      {completedTasks.has(task.id) && (
                        <div className="absolute -top-2 -right-3 bg-green-500 rounded-full p-1 shadow-sm border-2 border-white">
                          <Check className="w-4 h-4 text-white" />
                        </div>
                      )}
                    </div>
                    <span className={`text-xs md:text-sm font-bold text-center ${activeTask === task.id ? 'text-gray-800' : 'text-gray-500'}`}>{task.label}</span>
                  </button>
                ))}
              </div>
            </div>

            <div className="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden min-h-[500px]">
              {showReward ? (
                <RewardCard reward={lesson.reward} onReset={() => setShowReward(false)} />
              ) : (
                <>
                  {activeTask === 1 && <Task1Flashcards words={lesson.words} color={lesson.themeColor} btnColor={lesson.btnColor} onComplete={() => handleComplete(1)} />}
                  {activeTask === 2 && <Task2Listening words={lesson.words} color={lesson.themeColor} btnColor={lesson.btnColor} onComplete={() => handleComplete(2)} />}
                  {activeTask === 3 && <Task3Riddle riddle={lesson.riddle} color={lesson.themeColor} btnColor={lesson.btnColor} onComplete={() => handleComplete(3)} />}
                  {activeTask === 4 && <Task4Story sentence={lesson.sentence} color={lesson.themeColor} btnColor={lesson.btnColor} onComplete={() => handleComplete(4)} />}
                  {activeTask === 5 && <Task5Mission drawPrompt={lesson.drawPrompt} mission={lesson.mission} color={lesson.themeColor} btnColor={lesson.btnColor} onComplete={() => handleComplete(5)} />}
                </>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ============================================================================
    // 解鎖卡片元件
    // ============================================================================
    function RewardCard({ reward, onReset }) {
      return (
        <div className="p-8 md:p-12 text-center h-full flex flex-col justify-center items-center relative overflow-hidden">
          <div className="absolute top-0 left-0 w-full h-full pointer-events-none opacity-20">
            <div className="absolute top-10 left-10 text-4xl animate-bounce">✨</div>
            <div className="absolute bottom-10 right-10 text-4xl animate-bounce delay-100">🌟</div>
            <div className="absolute top-20 right-20 text-3xl animate-pulse">💖</div>
            <div className="absolute bottom-20 left-20 text-3xl animate-pulse">🎉</div>
          </div>

          <Award className="w-20 h-20 text-yellow-500 mb-6 drop-shadow-md" />
          <h2 className="text-3xl font-black text-gray-800 mb-2 tracking-wide">任務大滿貫！</h2>
          <p className="text-lg text-gray-500 mb-8 font-medium">恭喜啾寶解鎖了今天的神秘圖卡</p>

          <div className={`w-full max-w-md p-8 rounded-3xl border-4 shadow-xl mb-8 transform transition-all hover:scale-105 ${reward.color}`}>
            <div className="bg-white/60 w-full h-48 rounded-2xl flex items-center justify-center text-6xl mb-6 shadow-inner border border-white/50">
              {reward.emoji}
            </div>
            <h3 className="text-2xl font-black mb-3">{reward.name}</h3>
            <p className="text-base font-bold opacity-80 leading-relaxed">{reward.desc}</p>
          </div>

          <button onClick={onReset} className="px-8 py-4 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-2xl font-bold text-lg transition-all">
            收下卡片並返回任務板
          </button>
        </div>
      );
    }

    // ============================================================================
    // 任務一：魔法單字卡
    // ============================================================================
    function Task1Flashcards({ words, color, btnColor, onComplete }) {
      const [currentIndex, setCurrentIndex] = useState(0);
      const [isFlipped, setIsFlipped] = useState(false);
      const word = words[currentIndex];

      const handleNext = () => {
        setIsFlipped(false);
        if (currentIndex < words.length - 1) setCurrentIndex(prev => prev + 1);
      };

      const handlePrev = () => {
        setIsFlipped(false);
        if (currentIndex > 0) setCurrentIndex(prev => prev - 1);
      };

      return (
        <div className="p-6 md:p-10 flex flex-col items-center h-full">
          <div className="w-full flex justify-between items-center mb-8">
            <h3 className="font-bold text-xl text-gray-700 flex items-center">
              <ImageIcon className="text-2xl mr-3 text-indigo-500" />
              任務一：魔法單字卡
            </h3>
            <span className="text-base font-bold text-gray-400 bg-gray-100 px-4 py-1 rounded-full">{currentIndex + 1} / {words.length}</span>
          </div>
          <p className="text-base text-gray-500 mb-8 text-center font-medium">點擊喇叭聽發音，點擊卡片看中文喔！</p>
          
          <div 
            className={`w-full max-w-sm aspect-square rounded-[3rem] cursor-pointer perspective-1000 transition-all duration-500 shadow-lg border-4 border-gray-50 ${color}`}
            onClick={() => setIsFlipped(!isFlipped)}
          >
            <div className="w-full h-full flex flex-col items-center justify-center relative p-6 text-center">
              {!isFlipped ? (
                <>
                  <span className="text-8xl mb-6 block drop-shadow-md">{word.icon}</span>
                  <h2 className="text-5xl font-black text-gray-800 tracking-wider">{word.en}</h2>
                  <p className="text-sm font-bold text-gray-500/70 mt-4 absolute bottom-6 bg-white/50 px-4 py-2 rounded-full">點擊卡片翻面</p>
                </>
              ) : (
                <>
                  <h2 className="text-6xl font-black text-gray-800 mb-4">{word.zh}</h2>
                  <p className="text-2xl font-bold text-gray-600">{word.en}</p>
                </>
              )}
              <button 
                onClick={(e) => { e.stopPropagation(); playAudio(word.en); }}
                className="absolute top-6 right-6 bg-white p-4 rounded-full shadow-md border-2 border-white hover:bg-gray-50 active:scale-95"
              >
                <Volume2 className="w-8 h-8 text-blue-500" />
              </button>
            </div>
          </div>

          <div className="flex w-full max-w-sm justify-between mt-10">
            <button onClick={handlePrev} disabled={currentIndex === 0} className="px-6 py-4 bg-gray-100 hover:bg-gray-200 rounded-2xl disabled:opacity-30 font-bold text-gray-600 text-lg transition-all">
              上一個
            </button>
            {currentIndex === words.length - 1 ? (
              <button onClick={onComplete} className={`px-8 py-4 ${btnColor} hover:opacity-90 text-white rounded-2xl font-bold text-lg shadow-md animate-pulse`}>
                完成背誦！
              </button>
            ) : (
              <button onClick={handleNext} className="px-6 py-4 bg-gray-100 hover:bg-gray-200 rounded-2xl font-bold text-gray-600 text-lg transition-all">
                下一個
              </button>
            )}
          </div>
        </div>
      );
    }

    // ============================================================================
    // 任務二：聽音大考驗
    // ============================================================================
    function Task2Listening({ words, color, btnColor, onComplete }) {
      const [testQueue, setTestQueue] = useState([]);
      const [currentTest, setCurrentTest] = useState(null);
      const [options, setOptions] = useState([]);
      const [msg, setMsg] = useState("準備好就點擊播放！");
      const [isFinished, setIsFinished] = useState(false);

      useEffect(() => {
        const queue = [...words].sort(() => Math.random() - 0.5);
        setTestQueue(queue);
        loadTest(queue[0], words);
      }, [words]);

      const loadTest = (targetWord, allWords) => {
        if (!targetWord) return;
        setCurrentTest(targetWord);
        const others = allWords.filter(w => w.en !== targetWord.en).sort(() => Math.random() - 0.5).slice(0, 2);
        setOptions([targetWord, ...others].sort(() => Math.random() - 0.5));
        setMsg("請仔細聽，選出正確的圖片！");
      };

      const handleSelect = (opt) => {
        if (opt.en === currentTest.en) {
          playAudio("Good job!");
          setMsg("答對了！太棒了！🎉");
          setTimeout(() => {
            const newQueue = testQueue.slice(1);
            setTestQueue(newQueue);
            if (newQueue.length > 0) {
              loadTest(newQueue[0], words);
            } else {
              setIsFinished(true);
              onComplete();
            }
          }, 1000);
        } else {
          setMsg("哎呀，好像不是這個耶，再聽一次！💪");
          playAudio(currentTest.en);
        }
      };

      if (isFinished) {
        return (
          <div className="p-10 text-center h-full flex flex-col justify-center items-center min-h-[400px]">
            <div className="text-8xl mb-6 animate-bounce">🏆</div>
            <h3 className="text-3xl font-black text-gray-800 mb-4 tracking-wide">聽力滿分！</h3>
            <p className="text-lg text-gray-500 font-medium">你把所有的單字都記起來了，超級厲害！</p>
          </div>
        );
      }

      return (
        <div className="p-6 md:p-10">
          <div className="flex items-center mb-8 text-orange-600">
            <Volume2 className="w-6 h-6 mr-3" />
            <h3 className="font-bold text-xl">任務二：聽音大考驗</h3>
          </div>
          
          <p className="text-center text-lg font-bold text-gray-600 mb-8 bg-gray-50 p-4 rounded-2xl">{msg}</p>

          <div className="flex justify-center mb-10">
            <button 
              onClick={() => playAudio(currentTest?.en)}
              className={`w-32 h-32 rounded-full ${color} flex items-center justify-center shadow-lg border-4 border-white active:scale-95 transition-transform`}
            >
              <Volume2 className="w-14 h-14 text-gray-700" />
            </button>
          </div>

          <div className="grid grid-cols-3 gap-4 md:gap-6 max-w-2xl mx-auto">
            {options.map((opt, i) => (
              <button
                key={i}
                onClick={() => handleSelect(opt)}
                className="aspect-square bg-white border-4 border-gray-100 rounded-3xl flex flex-col items-center justify-center text-5xl md:text-6xl hover:border-orange-300 hover:bg-orange-50 transition-all shadow-sm active:scale-95"
              >
                {opt.icon}
                <span className="text-sm md:text-base font-bold text-gray-500 mt-4">{opt.zh}</span>
              </button>
            ))}
          </div>
        </div>
      );
    }

    // ============================================================================
    // 任務三：小偵探猜謎
    // ============================================================================
    function Task3Riddle({ riddle, color, btnColor, onComplete }) {
      const [selected, setSelected] = useState(null);
      const [isCorrect, setIsCorrect] = useState(false);

      const handleGuess = (option) => {
        setSelected(option);
        if (option === riddle.a) {
          setIsCorrect(true);
          playAudio("Correct!");
          onComplete();
        } else {
          setIsCorrect(false);
          playAudio("Try again!");
        }
      };

      return (
        <div className="p-6 md:p-10">
          <div className="flex items-center mb-8 text-indigo-600">
            <Search className="text-2xl mr-3" />
            <h3 className="font-bold text-xl">任務三：小偵探猜謎</h3>
          </div>
          
          <div className={`${color} p-8 rounded-3xl mb-8 relative border-2 border-white shadow-md flex items-center`}>
            <div className="text-5xl md:text-6xl mr-4 md:mr-6 drop-shadow-md">🤔</div>
            <p className="text-xl md:text-2xl font-black text-gray-800 leading-relaxed flex-1">{riddle.q}</p>
            <button 
              onClick={() => playAudio(riddle.q)}
              className="ml-4 p-4 bg-white rounded-full shadow-sm flex-shrink-0 active:scale-95 hover:bg-indigo-50 border-2 border-transparent hover:border-indigo-200 transition-all"
            >
              <Volume2 className="w-8 h-8 text-indigo-500" />
            </button>
          </div>

          <div className="space-y-4 max-w-2xl mx-auto">
            {riddle.options.map((opt, i) => (
              <div
                key={i}
                onClick={() => handleGuess(opt)}
                className={`w-full p-5 rounded-2xl font-bold text-xl transition-all flex justify-between items-center cursor-pointer
                  ${selected === opt ? 
                    (isCorrect ? 'bg-green-100 text-green-700 border-4 border-green-300' : 'bg-red-50 text-red-500 border-4 border-red-200') 
                    : 'bg-white border-4 border-gray-100 hover:bg-gray-50 hover:border-indigo-200'}`}
              >
                <span className="ml-2">{opt}</span>
                <button 
                  onClick={(e) => { e.stopPropagation(); playAudio(opt); }}
                  className="p-3 hover:bg-white rounded-full shadow-sm active:scale-95"
                >
                  <Volume2 className="w-6 h-6 text-gray-500" />
                </button>
              </div>
            ))}
          </div>
          
          {isCorrect && (
            <div className="mt-8 bg-yellow-50 p-6 rounded-2xl text-center border-2 border-yellow-200 animate-pulse max-w-2xl mx-auto">
              <p className="text-yellow-700 font-black text-xl tracking-wide">答對了！名偵探啾寶！🎉</p>
            </div>
          )}
        </div>
      );
    }

    // ============================================================================
    // 任務四：大聲說故事
    // ============================================================================
    function Task4Story({ sentence, color, btnColor, onComplete }) {
      const [read, setRead] = useState(false);

      return (
        <div className="p-6 md:p-10 text-center flex flex-col items-center justify-center min-h-[450px]">
          <div className="flex items-center mb-6 text-blue-600 self-start">
            <BookOpen className="text-2xl mr-3" />
            <h3 className="font-bold text-xl">任務四：大聲說</h3>
          </div>
          
          <p className="text-base md:text-lg text-gray-500 mb-10 font-bold bg-blue-50 px-6 py-3 rounded-full border border-blue-100">
            點擊喇叭慢慢聽，然後勇敢大聲唸出來！
          </p>
          
          <div className={`p-10 md:p-14 rounded-[3rem] mb-12 w-full max-w-2xl ${color} shadow-lg border-4 border-white relative`}>
            <p className="text-3xl md:text-4xl font-black text-gray-800 leading-relaxed tracking-wide">
              {sentence}
            </p>
            <button 
              onClick={() => playAudio(sentence, 0.3)}
              className="absolute -bottom-8 left-1/2 transform -translate-x-1/2 bg-white p-5 rounded-full shadow-xl border-4 border-blue-100 active:scale-95 hover:bg-blue-50 transition-all"
            >
              <Volume2 className="w-10 h-10 text-blue-500" />
            </button>
          </div>
          
          <div className="mt-6 w-full max-w-xl mx-auto">
            <button
              onClick={() => {
                setRead(true);
                onComplete();
              }}
              disabled={read}
              className={`w-full py-5 rounded-2xl font-black text-xl flex justify-center items-center transition-all shadow-md
                ${read ? 'bg-gray-200 text-gray-400' : `${btnColor} text-white hover:opacity-90 active:scale-95`}`}
            >
              {read ? '通關完成！' : '我唸得很棒！'}
              {!read && <Check className="w-6 h-6 ml-3" />}
            </button>
          </div>
        </div>
      );
    }

    // ============================================================================
    // 任務五：戶外任務與小畫布
    // ============================================================================
    function Task5Mission({ drawPrompt, mission, color, btnColor, onComplete }) {
      const canvasRef = useRef(null);
      const [isDrawing, setIsDrawing] = useState(false);
      const [drawn, setDrawn] = useState(false);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (canvas) {
          const ctx = canvas.getContext('2d');
          ctx.lineCap = 'round';
          ctx.lineWidth = 5;
          ctx.strokeStyle = '#3B82F6';
        }
      }, [drawPrompt]);

      const getCoordinates = (e, canvas) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        return {
          x: (clientX - rect.left) * scaleX,
          y: (clientY - rect.top) * scaleY
        };
      };

      const startDraw = (e) => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const { x, y } = getCoordinates(e, canvas);
        ctx.beginPath();
        ctx.moveTo(x, y);
        setIsDrawing(true);
        e.preventDefault(); // 防止平板滑動
      };

      const draw = (e) => {
        if (!isDrawing) return;
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const { x, y } = getCoordinates(e, canvas);
        ctx.lineTo(x, y);
        ctx.stroke();
        setDrawn(true);
        e.preventDefault();
      };

      const endDraw = () => setIsDrawing(false);

      const clearCanvas = () => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        setDrawn(false);
      };

      return (
        <div className="p-6 md:p-10">
          <div className="flex items-center mb-6 text-pink-600">
            <Car className="text-2xl mr-3" />
            <h3 className="font-bold text-xl">任務五：動動手與出任務</h3>
          </div>
          
          <div className={`mb-8 p-6 rounded-3xl ${color} border-2 border-white shadow-sm flex items-start`}>
            <div className="text-3xl mr-4 bg-white p-3 rounded-full shadow-sm">🚗</div>
            <div>
              <p className="text-base font-black text-gray-800 mb-2">媽媽的週五小任務：</p>
              <p className="text-base text-gray-700 font-medium leading-relaxed">{mission}</p>
            </div>
          </div>

          <div className="flex justify-between items-center mb-4">
            <p className="text-sm md:text-base font-bold text-gray-600 bg-gray-100 px-4 py-2 rounded-xl flex-1 mr-4">{drawPrompt}</p>
            <button onClick={clearCanvas} className="p-3 bg-gray-100 rounded-full text-gray-500 hover:bg-gray-200 active:scale-95 shadow-sm shrink-0 transition-all">
              <RefreshCcw className="w-5 h-5" />
            </button>
          </div>
          
          <div className="border-4 border-dashed border-gray-300 rounded-[2rem] overflow-hidden bg-white shadow-inner mb-8 relative max-w-2xl mx-auto">
             <canvas
              ref={canvasRef}
              width={800}
              height={400}
              onMouseDown={startDraw}
              onMouseMove={draw}
              onMouseUp={endDraw}
              onMouseOut={endDraw}
              onTouchStart={startDraw}
              onTouchMove={draw}
              onTouchEnd={endDraw}
              className="w-full h-auto aspect-[2/1] touch-none cursor-crosshair"
              style={{ touchAction: 'none' }}
            />
            {!drawn && (
              <div className="absolute inset-0 flex items-center justify-center pointer-events-none opacity-30">
                <Edit2 className="w-16 h-16 text-gray-400" />
                <span className="ml-4 font-bold text-2xl text-gray-400">在這裡畫畫吧！</span>
              </div>
            )}
          </div>

          <div className="max-w-xl mx-auto">
            <button
              onClick={onComplete}
              disabled={!drawn}
              className={`w-full py-5 rounded-2xl font-black text-xl transition-all shadow-md
                ${drawn ? `${btnColor} text-white hover:opacity-90 active:scale-95` : 'bg-gray-100 text-gray-400 border-2 border-gray-200'}`}
            >
              大功告成！領取星星 ⭐️
            </button>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
